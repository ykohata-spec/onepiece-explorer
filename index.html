<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1c1c1a" media="(prefers-color-scheme: dark)">
<title>ワンピース キャラ関係図</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #f5f4f0; --bg3: #eeede9;
  --text: #1a1a18; --text2: #6b6a64; --text3: #9b9a94;
  --border: rgba(0,0,0,0.11); --border2: rgba(0,0,0,0.2);
  --accent: #178DDC; --radius: 10px; --radius-lg: 14px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a; --bg2: #252522; --bg3: #2e2e2b;
    --text: #e8e6de; --text2: #9b9a94; --text3: #6b6a64;
    --border: rgba(255,255,255,0.09); --border2: rgba(255,255,255,0.18);
  }
}
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100svh; overflow-x: hidden;
  padding-bottom: calc(80px + var(--safe-bottom));
}

/* ── ヘッダー ── */
.header {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg); border-bottom: 0.5px solid var(--border);
  padding: 12px 16px 10px;
}
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.app-title { font-size: 17px; font-weight: 700; color: var(--text); }
.mode-btns { display: flex; gap: 4px; }
.mbtn {
  padding: 6px 14px; font-size: 13px; border-radius: 20px;
  border: 0.5px solid var(--border2); background: transparent;
  color: var(--text2); cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: all .15s;
}
.mbtn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* 巻数スライダー */
.vol-row { display: flex; align-items: center; gap: 10px; }
.vol-label { font-size: 13px; color: var(--text2); white-space: nowrap; flex-shrink: 0; }
.vol-slider { flex: 1; -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; background: var(--border2); outline: none; accent-color: var(--accent); }
.vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: var(--accent); cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
.vol-num { font-size: 14px; font-weight: 600; color: var(--text); min-width: 60px; text-align: right; }

/* 検索 */
.search-wrap { padding: 8px 16px 0; }
.search-box {
  width: 100%; padding: 10px 14px; border-radius: var(--radius);
  border: 0.5px solid var(--border2); background: var(--bg2);
  color: var(--text); font-size: 15px; outline: none;
  -webkit-appearance: none;
}
.search-box::placeholder { color: var(--text3); }
.search-box:focus { border-color: var(--accent); background: var(--bg); }

/* フィルター・アーク */
.filter-section { padding: 8px 16px 0; }
.filter-label { font-size: 11px; color: var(--text3); margin-bottom: 5px; }
.pill-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.pill-row::-webkit-scrollbar { display: none; }
.fbtn, .arc-pill {
  flex-shrink: 0; padding: 5px 12px; font-size: 12px; border-radius: 16px;
  border: 0.5px solid var(--border2); background: transparent;
  color: var(--text2); cursor: pointer; white-space: nowrap;
  -webkit-tap-highlight-color: transparent; transition: all .15s;
}
.fbtn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.arc-pill { background: var(--bg2); }
.arc-pill.active { background: #533AB7; border-color: #533AB7; color: #fff; }
.arc-pill.locked { opacity: .35; }

/* コンテンツエリア */
.content { padding: 12px 16px; }

/* カードグリッド */
#cardGrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
@media (min-width: 480px) { #cardGrid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 680px) { #cardGrid { grid-template-columns: repeat(4, 1fr); } }

.card {
  background: var(--bg); border: 0.5px solid var(--border);
  border-radius: var(--radius-lg); padding: 10px;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  active-tap-color: transparent;
  transition: border-color .1s;
}
.card:active { background: var(--bg2); }
.card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.av {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.c-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
.c-role { font-size: 10px; color: var(--text2); margin-top: 1px; line-height: 1.3; }
.c-badge { display: inline-block; padding: 2px 7px; border-radius: 9px; font-size: 10px; margin-top: 4px; }
.c-debut { font-size: 10px; color: var(--text3); margin-top: 2px; }

/* ネットワーク */
#netWrap {
  width: 100%; border: 0.5px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden; background: var(--bg2);
}
#netCanvas { display: block; touch-action: none; }
.net-hint { font-size: 11px; color: var(--text3); margin-top: 6px; text-align: center; }
.legend { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
.leg-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text2); }
.leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

/* モーダル（スマホ：下からスライドアップ） */
.modal-backdrop {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.45);
  align-items: flex-end; justify-content: center;
}
.modal-backdrop.open { display: flex; }
.modal-box {
  background: var(--bg); width: 100%; max-height: 88svh;
  border-radius: 20px 20px 0 0;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 0 0 calc(24px + var(--safe-bottom));
  position: relative;
}
.modal-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--border2); margin: 10px auto 4px;
}
.modal-body { padding: 0 18px 8px; }
.modal-close-btn {
  position: absolute; top: 10px; right: 14px;
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--bg2); border: none;
  font-size: 14px; color: var(--text2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.modal-head { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.modal-av { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; flex-shrink: 0; }
.modal-name { font-size: 17px; font-weight: 700; color: var(--text); }
.modal-role { font-size: 12px; color: var(--text2); margin-top: 2px; }
.modal-desc { font-size: 13px; color: var(--text2); line-height: 1.7; border-top: 0.5px solid var(--border); padding-top: 10px; }
.bounty-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.bounty-tag { font-size: 12px; background: #FAEEDA; color: #633806; border-radius: 8px; padding: 3px 10px; font-weight: 500; }
@media (prefers-color-scheme: dark) { .bounty-tag { background: #412402; color: #FAC775; } }
.sec-title { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin: 14px 0 6px; }
.rel-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 0.5px solid var(--border);
  font-size: 14px; color: var(--text);
}
.rel-row:last-child { border: none; }
.rel-av { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.rel-type { font-size: 11px; color: var(--text2); margin-left: auto; }
.spoiler-note { font-size: 12px; color: var(--text2); background: var(--bg2); border-radius: var(--radius); padding: 8px 12px; margin-top: 12px; line-height: 1.5; }
.empty { text-align: center; padding: 3rem 1rem; color: var(--text2); font-size: 14px; }
</style>
</head>
<body>

<!-- ヘッダー（スティッキー） -->
<div class="header">
  <div class="header-top">
    <div class="app-title">ワンピース キャラ関係図</div>
    <div class="mode-btns">
      <button class="mbtn active" id="btnCard" onclick="setMode('card')">カード</button>
      <button class="mbtn" id="btnNet" onclick="setMode('network')">ネットワーク</button>
    </div>
  </div>
  <div class="vol-row">
    <span class="vol-label">読んだ巻：</span>
    <input class="vol-slider" type="range" id="volRange" min="1" max="114" value="25" step="1" oninput="onVol(this.value)">
    <span class="vol-num" id="volDisp">1〜25巻</span>
  </div>
</div>

<!-- 検索 -->
<div class="search-wrap">
  <input class="search-box" type="search" id="searchBox" placeholder="キャラ名で検索…" oninput="render()" autocomplete="off" autocorrect="off" spellcheck="false">
</div>

<!-- グループフィルター -->
<div class="filter-section" style="margin-top:8px">
  <div class="filter-label">グループ</div>
  <div class="pill-row" id="groupBtns">
    <button class="fbtn active" data-f="all">全員</button>
    <button class="fbtn" data-f="麦わら海賊団">麦わら</button>
    <button class="fbtn" data-f="海軍">海軍</button>
    <button class="fbtn" data-f="四皇">四皇</button>
    <button class="fbtn" data-f="七武海">七武海</button>
    <button class="fbtn" data-f="革命軍">革命軍</button>
    <button class="fbtn" data-f="和の国">和の国</button>
    <button class="fbtn" data-f="最悪の世代">最悪の世代</button>
    <button class="fbtn" data-f="その他">その他</button>
  </div>
</div>

<!-- アークフィルター -->
<div class="filter-section" style="margin-top:6px">
  <div class="filter-label">アーク</div>
  <div class="pill-row" id="arcRow"></div>
</div>

<!-- レジェンド（ネットワーク時のみ） -->
<div class="filter-section" id="legendRow" style="display:none;margin-top:6px">
  <div class="legend" id="legendInner"></div>
</div>

<!-- コンテンツ -->
<div class="content">
  <div id="cardView"><div id="cardGrid"></div></div>
  <div id="netView" style="display:none">
    <div id="netWrap"><canvas id="netCanvas"></canvas></div>
    <div class="net-hint">ノードをドラッグ移動 · タップで詳細</div>
  </div>
</div>

<!-- モーダル -->
<div class="modal-backdrop" id="modalBackdrop" onclick="onBackdropClick(event)">
  <div class="modal-box" id="modalBox">
    <div class="modal-handle"></div>
    <button class="modal-close-btn" onclick="closeModal()">✕</button>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

let curVol=25,activeFilter="all",activeArc=null,mode="card";
let nodes=[],edges=[],animId=null;
let dragging=null,dragStartX=0,dragStartY=0,hasDragged=false;

function getCharState(c){const h=c.history.filter(x=>x.vol<=curVol);return h.length?h[h.length-1]:null}
function visibleRels(c){return c.rels.filter(r=>{const rc=CHARS.find(x=>x.id===r.n||x.name===r.n);if(!rc||rc.debut>curVol)return false;if(r.since&&r.since>curVol)return false;return true})}
function visibleChars(){
  let list=CHARS.filter(c=>c.debut<=curVol&&getCharState(c));
  if(activeFilter!=="all")list=list.filter(c=>c.group===activeFilter);
  if(activeArc)list=list.filter(c=>c.arcs.includes(activeArc));
  const q=document.getElementById("searchBox").value.trim();
  if(q)list=list.filter(c=>c.name.includes(q)||c.id.includes(q));
  return list;
}
function onVol(v){
  curVol=parseInt(v);
  document.getElementById("volDisp").textContent="1〜"+v+"巻";
  renderArcRow();
  if(mode==="network")initNetwork();else render();
}
function setMode(m){
  mode=m;
  document.getElementById("btnCard").classList.toggle("active",m==="card");
  document.getElementById("btnNet").classList.toggle("active",m==="network");
  document.getElementById("cardView").style.display=m==="card"?"block":"none";
  document.getElementById("netView").style.display=m==="network"?"block":"none";
  document.getElementById("legendRow").style.display=m==="network"?"block":"none";
  closeModal();
  if(m==="network")initNetwork();else render();
}
function renderArcRow(){
  document.getElementById("arcRow").innerHTML=ARCS.map(a=>{
    const locked=a.volMin>curVol;
    return`<button class="arc-pill${activeArc===a.id?" active":""}${locked?" locked":""}" onclick="toggleArc('${a.id}',${locked})">${a.name}</button>`;
  }).join("");
}
function toggleArc(id,locked){if(locked)return;activeArc=activeArc===id?null:id;renderArcRow();if(mode==="network")initNetwork();else render()}
function render(){
  const grid=document.getElementById("cardGrid");
  const list=visibleChars();
  if(!list.length){grid.innerHTML='<div class="empty">該当するキャラがいません</div>';return}
  grid.innerHTML=list.map(c=>{
    const g=GRP[c.group]||GRP["その他"];
    const st=getCharState(c);
    const short=c.name.length>9?c.name.slice(0,9)+"…":c.name;
    const age=getDisplayAge(c);

      <div class="card-top"><div class="av" style="background:${g.bg};color:${g.fg}">${c.id.slice(0,2)}</div>

      <span class="c-badge" style="background:${g.bg};color:${g.fg}">${c.group}</span>
      <div class="c-debut">初登場 ${c.debut}巻${age!=null?" · "+age+"歳":""}</div></div>`;
  }).join("");
}
function showModal(id){
  const c=CHARS.find(x=>x.id===id);if(!c)return;
  const g=GRP[c.group]||GRP["その他"];
  const st=getCharState(c);if(!st)return;

  const hidden=c.rels.length-vRels.length;

    <div class="modal-head">

    </div>
    <div class="sec-title">関係（${curVol}巻時点）</div>
    ${vRels.length?vRels.map(r=>{
      const rc=CHARS.find(x=>x.id===r.n||x.name===r.n);

      return`<div class="rel-row"><div class="rel-av" style="background:${rg.bg};color:${rg.fg}">${r.n.slice(0,2)}</div><span>${r.n}</span><span class="rel-type">${r.t}</span></div>`;

    ${hidden?`<div class="spoiler-note">あと${hidden}件の関係は続きを読むと解放されます</div>`:""}

// ─── Network ───
function initNetwork(){
  canvas=document.getElementById("netCanvas");
  ctx=canvas.getContext("2d");
  const wrap=document.getElementById("netWrap");
  const W=wrap.clientWidth||360;
  const list=visibleChars();
  const H=Math.max(400,Math.min(660,list.length*18+100));
  canvas.width=W*window.devicePixelRatio;
  canvas.height=H*window.devicePixelRatio;
  canvas.style.width=W+"px";
  canvas.style.height=H+"px";
  ctx.scale(window.devicePixelRatio,window.devicePixelRatio);
  wrap.style.height=H+"px";
  const existing=Object.fromEntries((nodes||[]).map(n=>[n.id,{x:n.x,y:n.y}]));
  nodes=list.map((c,i)=>{
    const prev=existing[c.id];
    if(prev)return{id:c.id,c,x:prev.x,y:prev.y,vx:0,vy:0,r:20};
    const angle=(i/list.length)*Math.PI*2;
    const r=Math.min(W,H)*0.3;
    return{id:c.id,c,x:W/2+r*Math.cos(angle),y:H/2+r*Math.sin(angle),vx:0,vy:0,r:20};
  });
  edges=[];
  nodes.forEach(n=>{
    visibleRels(n.c).forEach(rel=>{
      const t=nodes.find(m=>m.id===rel.n||m.c.name===rel.n);
      if(t&&t.id>n.id)edges.push({a:n,b:t,type:rel.t});
    });
  });
  document.getElementById("legendInner").innerHTML=Object.entries(GRP).map(([k,v])=>`<div class="leg-item"><div class="leg-dot" style="background:${v.dot}"></div><span>${k}</span></div>`).join("");
  selectedNode=null;closeModal();
  if(animId)cancelAnimationFrame(animId);
  loop();setupCanvasEvents();
}
function loop(){
  const W=parseInt(canvas.style.width),H=parseInt(canvas.style.height);
  nodes.forEach(n=>{
    if(n===dragging)return;
    nodes.forEach(m=>{
      if(n===m)return;
      const dx=n.x-m.x,dy=n.y-m.y,d=Math.sqrt(dx*dx+dy*dy)||1;
      const f=1400/(d*d);n.vx+=dx/d*f;n.vy+=dy/d*f;
    });
    n.vx+=(W/2-n.x)*0.004;n.vy+=(H/2-n.y)*0.004;
  });
  edges.forEach(e=>{
    const dx=e.b.x-e.a.x,dy=e.b.y-e.a.y,d=Math.sqrt(dx*dx+dy*dy)||1;
    const f=(d-120)*0.04;
    e.a.vx+=dx/d*f;e.a.vy+=dy/d*f;
    e.b.vx-=dx/d*f;e.b.vy-=dy/d*f;
  });
  nodes.forEach(n=>{
    if(n===dragging)return;
    n.vx*=0.8;n.vy*=0.8;
    n.x=Math.max(n.r+2,Math.min(W-n.r-2,n.x+n.vx));
    n.y=Math.max(n.r+2,Math.min(H-n.r-2,n.y+n.vy));
  });
  drawNet();
  animId=requestAnimationFrame(loop);
}
function drawNet(){
  const W=parseInt(canvas.style.width),H=parseInt(canvas.style.height);
  ctx.clearRect(0,0,W,H);
  const selEdges=selectedNode?edges.filter(e=>e.a===selectedNode||e.b===selectedNode):[];
  edges.forEach(e=>{
    const isSel=selEdges.includes(e);
    ctx.beginPath();ctx.moveTo(e.a.x,e.a.y);ctx.lineTo(e.b.x,e.b.y);
    ctx.strokeStyle=isSel?"#7F77DD":"rgba(136,135,128,0.2)";
    ctx.lineWidth=isSel?2:1;ctx.stroke();
    if(isSel){
      const lx=(e.a.x+e.b.x)/2,ly=(e.a.y+e.b.y)/2;
      ctx.save();ctx.font="bold 10px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";
      const tw=ctx.measureText(e.type).width;
      ctx.fillStyle="rgba(238,237,254,0.93)";ctx.fillRect(lx-tw/2-3,ly-8,tw+6,16);
      ctx.fillStyle="#3C3489";ctx.fillText(e.type,lx,ly);ctx.restore();
    }
  });
  nodes.forEach(n=>{
    const g=GRP[n.c.group]||GRP["その他"];
    const isSel=n===selectedNode;
    const isConn=!!selectedNode&&selEdges.some(e=>e.a===n||e.b===n)&&!isSel;
    const fade=!!selectedNode&&!isSel&&!isConn;
    ctx.globalAlpha=fade?0.3:1;
    ctx.beginPath();ctx.arc(n.x,n.y,n.r+(isSel?5:0),0,Math.PI*2);
    ctx.fillStyle=isSel?"#7F77DD":isConn?"#AFA9EC":g.dot;
    ctx.fill();ctx.strokeStyle="rgba(255,255,255,0.75)";ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle="#fff";ctx.font="bold 10px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText(n.id.slice(0,2),n.x,n.y);
    ctx.fillStyle=isSel?"#3C3489":g.fg;
    ctx.font=(isSel?"bold ":"")+"10px sans-serif";ctx.textBaseline="top";ctx.textAlign="center";
    ctx.fillText(n.id,n.x,n.y+n.r+3);
    ctx.globalAlpha=1;
  });
  ctx.textBaseline="alphabetic";
}
function getNodeAt(x,y){return nodes.find(n=>Math.hypot(n.x-x,n.y-y)<=n.r+6)||null}
function canvasPos(e){const r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}
function canvasPosT(t){const r=canvas.getBoundingClientRect();return{x:t.clientX-r.left,y:t.clientY-r.top}}
function setupCanvasEvents(){
  canvas.onmousedown=e=>{const{x,y}=canvasPos(e);dragStartX=x;dragStartY=y;hasDragged=false;const n=getNodeAt(x,y);if(n)dragging=n};
  canvas.onmousemove=e=>{if(!dragging)return;const{x,y}=canvasPos(e);if(Math.hypot(x-dragStartX,y-dragStartY)>4)hasDragged=true;dragging.x=x;dragging.y=y;dragging.vx=0;dragging.vy=0};
  canvas.onmouseup=e=>{const{x,y}=canvasPos(e);const n=getNodeAt(x,y);if(!hasDragged&&n){if(selectedNode===n){closeModal();selectedNode=null}else{selectedNode=n;showModal(n.id)}}dragging=null;hasDragged=false};
  canvas.onmouseleave=()=>{dragging=null};
  canvas.ontouchstart=e=>{e.preventDefault();const t=e.touches[0];const{x,y}=canvasPosT(t);dragStartX=x;dragStartY=y;hasDragged=false;const n=getNodeAt(x,y);if(n)dragging=n};
  canvas.ontouchmove=e=>{e.preventDefault();if(!dragging)return;const t=e.touches[0];const{x,y}=canvasPosT(t);if(Math.hypot(x-dragStartX,y-dragStartY)>8)hasDragged=true;dragging.x=x;dragging.y=y;dragging.vx=0;dragging.vy=0};
  canvas.ontouchend=e=>{if(!hasDragged&&dragging){if(selectedNode===dragging){closeModal();selectedNode=null}else{selectedNode=dragging;showModal(dragging.id)}}dragging=null;hasDragged=false};
}
document.getElementById("groupBtns").addEventListener("click",e=>{
  if(!e.target.classList.contains("fbtn"))return;
  document.querySelectorAll(".fbtn").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");activeFilter=e.target.dataset.f;
  if(mode==="network")initNetwork();else render();
});
renderArcRow();render();
</script>
